<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Specter NexUX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #030712; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Arka Plan Glow Efektleri (Penguin Panic stili) */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(0, 242, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* Glassmorphism Kartlar */
        .nex-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        /* Ana Portal (Tıklama Alanı) */
        .portal-ring {
            width: 280px; height: 280px; border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.1);
            position: relative; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
        }
        .portal-ring::before {
            content: ''; position: absolute; inset: -10px; border-radius: 50%;
            border: 1px dashed rgba(0, 242, 255, 0.2); animation: spin 20s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ghost-main {
            width: 160px; filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.4));
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ghost-main:active { transform: scale(0.9); }

        /* Navigasyon */
        .nav-active { color: var(--accent); position: relative; }
        .nav-active::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent);
        }
    </style>
</head>
<body class="p-6 flex flex-col justify-between">
    <div class="bg-mesh"></div>

    <div class="flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 nex-card flex items-center justify-center border-accent/20">
                <span class="text-accent font-bold">S</span>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Operator</p>
                <p class="text-xs font-bold">Specter_Dev</p>
            </div>
        </div>
        <div class="nex-card px-4 py-2 flex items-center gap-2 border-accent/10">
            <div class="w-2 h-2 rounded-full bg-accent animate-pulse"></div>
            <span class="text-[10px] font-bold tracking-tighter">PHASE 1 ACTIVE</span>
        </div>
    </div>

    <div class="flex flex-col items-center">
        <div class="text-center mb-10">
            <p class="text-[11px] text-gray-500 font-bold uppercase tracking-[0.4em] mb-2">Total Power</p>
            <h1 class="text-6xl font-extrabold tracking-tighter text-white">1,250<span class="text-accent">.00</span></h1>
        </div>

        <div class="portal-ring" id="tap-node">
            <img src="https://i.ibb.co/hR0fH8M/ghost-silhouette.png" class="ghost-main" id="ghost-img">
        </div>

        <div class="w-full grid grid-cols-2 gap-4 mt-12">
            <div class="nex-card p-4">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Profit/Hr</p>
                <p class="text-sm font-bold text-accent">+12.5K</p>
            </div>
            <div class="nex-card p-4 text-right">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Next Level</p>
                <p class="text-sm font-bold">Elite Miner</p>
            </div>
        </div>
    </div>

    <div class="w-full space-y-6">
        <div class="flex justify-between items-end px-2">
            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-bold text-accent">ENERGY STORAGE</span>
                <span class="text-lg font-black font-mono">68<span class="text-gray-600 text-xs">/68</span></span>
            </div>
            <div class="w-32 h-1 bg-gray-900 rounded-full overflow-hidden">
                <div class="h-full bg-accent w-full"></div>
            </div>
        </div>

        <nav class="nex-card h-20 flex justify-around items-center px-4 border-white/5">
            <div class="flex flex-col items-center gap-1 nav-active">
                <span class="text-xl">💠</span>
                <span class="text-[9px] font-bold">CORE</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-600">
                <span class="text-xl">⚡</span>
                <span class="text-[9px] font-bold">NODES</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-600">
                <span class="text-xl">🏆</span>
                <span class="text-[9px] font-bold">TASKS</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-gray-600">
                <span class="text-xl">👤</span>
                <span class="text-[9px] font-bold">SYSTEM</span>
            </div>
        </nav>
    </div>

    <script>
        const ghost = document.getElementById('ghost-img');
        ghost.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (navigator.vibrate) navigator.vibrate(15);
            // Penguin Panic'teki gibi ufak bir parıltı efekti buraya eklenebilir
        });
    </script>
</body>
</html>
