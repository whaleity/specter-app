<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Specter - Elite Digital Asset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            letter-spacing: -0.02em;
        }
        
        /* Premium Cam Efekti */
        .premium-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        /* Kurumsal "Specter" Çekirdeği */
        .core-interface {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #064e3b 0%, #050505 80%);
            border: 1px solid rgba(16, 185, 129, 0.2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .core-interface:active {
            transform: scale(0.97);
            border-color: #10b981;
            background: radial-gradient(circle at center, #065f46 0%, #050505 85%);
        }

        /* Hayalet Silüeti - Daha Minimal */
        .ghost-vector {
            width: 120px;
            opacity: 0.15;
            filter: grayscale(1) invert(1);
        }

        /* Alt Navigasyon - Minimalist */
        .nav-link {
            font-size: 10px;
            font-weight: 600;
            color: #444;
            transition: color 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .nav-link.active {
            color: #10b981;
        }

        /* Gizli Işık Efekti */
        .top-glow {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px; background: #10b981;
            filter: blur(150px); opacity: 0.08; z-index: -1;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-8 px-6 h-screen">
    <div class="top-glow"></div>

    <div class="w-full flex justify-between items-start">
        <div class="space-y-1">
            <h2 class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Operator</h2>
            <p class="text-sm font-semibold tracking-tight">ID: SPECTER_0822</p>
        </div>
        <div class="text-right space-y-1">
            <h2 class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Network Status</h2>
            <p class="text-sm font-semibold text-emerald-500 flex items-center justify-end gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                ACTIVE
            </p>
        </div>
    </div>

    <div class="text-center space-y-2">
        <p class="text-[11px] text-gray-500 font-medium tracking-[0.3em] uppercase">Accumulated Assets</p>
        <div class="flex items-baseline justify-center gap-2">
            <h1 id="balance" class="text-6xl font-extrabold tracking-tighter">14,250.00</h1>
            <span class="text-lg font-light text-emerald-500">SPCT</span>
        </div>
        <div class="flex justify-center gap-4 pt-4">
            <div class="premium-card px-4 py-2 text-left min-w-[120px]">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Yield / Hr</p>
                <p class="text-sm font-semibold">+0.82 SPCT</p>
            </div>
            <div class="premium-card px-4 py-2 text-left min-w-[120px]">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Multiplier</p>
                <p class="text-sm font-semibold text-emerald-500">x2.44</p>
            </div>
        </div>
    </div>

    <div id="tap-target" class="core-interface shadow-2xl">
        <div class="text-center z-10">
            <p class="text-[10px] text-emerald-400 font-bold tracking-[0.5em] mb-2 uppercase">Interface</p>
            <div class="w-16 h-[1px] bg-emerald-900 mx-auto"></div>
        </div>
        <img src="https://i.ibb.co/hR0fH8M/ghost-silhouette.png" class="absolute ghost-vector pointer-events-none" alt="specter">
    </div>

    <div class="w-full space-y-8">
        <div class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest text-emerald-500">System Energy</span>
                <span id="energy-text" class="text-xs font-mono font-semibold">68 / 68</span>
            </div>
            <div class="w-full h-[3px] bg-gray-900 rounded-full overflow-hidden">
                <div id="energy-bar" class="h-full bg-emerald-500 transition-all duration-500" style="width: 100%"></div>
            </div>
        </div>

        <nav class="flex justify-between items-center border-t border-gray-900 pt-6">
            <div class="nav-link active">Terminal</div>
            <div class="nav-link">Assets</div>
            <div class="nav-link">Nodes</div>
            <div class="nav-link">Secure</div>
        </nav>
    </div>

    <script>
        let balance = 14250.00;
        let energy = 68;
        const maxEnergy = 68;
        const balanceDisplay = document.getElementById('balance');
        const energyBar = document.getElementById('energy-bar');
        const energyText = document.getElementById('energy-text');

        document.getElementById('tap-target').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (energy > 0) {
                balance += 0.05;
                energy -= 1;
                updateUI();
                if (navigator.vibrate) navigator.vibrate(10);
            }
        });

        function updateUI() {
            balanceDisplay.innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            energyText.innerText = `${energy} / ${maxEnergy}`;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;
        }

        // Pasif Kazanç (Yıllık verim gibi ağır ağır artar)
        setInterval(() => {
            balance += 0.0002;
            updateUI();
        }, 1000);
    </script>
</body>
</html>
