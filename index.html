<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Specter Elite Miner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #1DB954; --dark-bg: #050505; --glass: rgba(255, 255, 255, 0.04); }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(29, 185, 84, 0.1); border-radius: 16px; }
        .neon-text { text-shadow: 0 0 8px var(--neon); color: var(--neon); }
        
        /* Hayalet Profil Görseli */
        .ghost-avatar {
            width: 48px; height: 48px;
            background-image: url('https://i.ibb.co/hR0fH8M/ghost-silhouette.png'); /* Senin Görselin */
            background-size: cover; background-position: center; border-radius: 12px;
            border: 2px solid var(--neon); box-shadow: 0 0 10px var(--neon);
        }

        /* Ana Coin Çekirdeği */
        .coin-core {
            width: 220px; height: 220px;
            background: radial-gradient(circle, #1DB954 0%, #000 85%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 5px solid rgba(29, 185, 84, 0.2); box-shadow: 0 0 30px rgba(29, 185, 84, 0.15);
            transition: transform 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .coin-core:active { transform: scale(0.90); }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-5 px-4 pb-24">

    <div class="w-full max-w-sm flex items-center justify-between glass-card p-3 border border-gray-900">
        <div class="flex items-center gap-3">
            <div class="ghost-avatar"></div>
            <div>
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Specter Pilot</h2>
                <p class="font-semibold text-white text-sm">Novice Miner</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-500 font-bold uppercase">Profit / Hr</p>
            <p class="text-xs font-cyber neon-text">+12.5K</p>
        </div>
    </div>

    <div class="text-center">
        <div class="flex items-center justify-center gap-2 mb-2">
            <span class="text-gray-400 font-bold tracking-[0.2em] text-xs">TOTAL BALANCE</span>
        </div>
        <h1 id="balance" class="text-5xl font-cyber font-bold tracking-tighter text-white">1,250.78</h1>
    </div>

    <div id="tap-target" class="coin-core cursor-pointer relative">
        <span class="text-6xl">👻</span> </div>

    <div class="w-full max-w-sm px-2 space-y-4">
        <div class="flex justify-between items-end">
            <div class="flex items-center gap-2">
                <span class="text-2xl">⚡</span>
                <p id="energy-val" class="text-2xl font-cyber font-bold">68 / 68</p>
            </div>
            <p class="text-xs font-bold text-[#1DB954] uppercase tracking-widest">Boost 🚀</p>
        </div>
        <div class="w-full bg-gray-900 h-2 rounded-full border border-gray-800">
            <div id="energy-bar" class="bg-gradient-to-r from-[#1DB954] to-[#0d5c2a] h-full rounded-full transition-all duration-300" style="width: 100%"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/80 backdrop-blur-xl border-t border-[#1DB954]/10 px-6 flex justify-around items-center z-50">
        <div class="text-[#1DB954] text-center font-bold text-[10px]">⛏️<br>MINE</div>
        <div class="text-gray-600 text-center font-bold text-[10px]">📋<br>TASKS</div>
        <div class="text-gray-600 text-center font-bold text-[10px]">👥<br>FRIENDS</div>
        <div class="text-gray-600 text-center font-bold text-[10px]">👛<br>WALLET</div>
    </nav>

    <script>
        let balance = 1250.78; let energy = 68; const maxEnergy = 68;
        const tapTarget = document.getElementById('tap-target'); const balanceDisplay = document.getElementById('balance');
        const energyBar = document.getElementById('energy-bar'); const energyVal = document.getElementById('energy-val');

        tapTarget.addEventListener('touchstart', (e) => {
            e.preventDefault(); if (energy > 0) { handleTap(); }
        });

        function handleTap() {
            balance += 0.01; energy -= 1;
            balanceDisplay.innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            energyVal.innerText = `${energy} / ${maxEnergy}`;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;
            if (navigator.vibrate) navigator.vibrate(20);
        }
    </script>
</body>
</html>
